version: "3.9"

services:
  api:
    build: .
    container_name: cia_api
    ports:
      - "8001:8001"
    env_file:
      - .env         # swap to .env.paid for production
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - .:/app             # live-reload friendly for local dev
      - cia_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cia_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  cia_data:
